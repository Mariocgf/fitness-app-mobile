<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8CF550"/>
      <stop offset="35%" stop-color="#5CE06A"/>
      <stop offset="65%" stop-color="#34D17A"/>
      <stop offset="100%" stop-color="#1ABF70"/>
